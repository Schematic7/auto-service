<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Vehicle - AutoService</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold;}
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px;}
        .btn-submit:hover { background-color: #218838; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
        .error { color: #dc3545; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>🛠️ Edit Vehicle</h2>

    <form th:action="@{/vehicles/{id}/edit(id=${vehicleEditDTO.id})}" th:method="POST" th:object="${vehicleEditDTO}">

        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="make">Make</label>
            <input type="text" id="make" th:field="*{make}" />
            <div class="error" th:if="${#fields.hasErrors('make')}" th:errors="*{make}">Make Error</div>
        </div>

        <div class="form-group">
            <label for="model">Model</label>
            <input type="text" id="model" th:field="*{model}" />
            <div class="error" th:if="${#fields.hasErrors('model')}" th:errors="*{model}">Model Error</div>
        </div>

        <div class="form-group">
            <label for="year">Year</label>
            <input type="number" id="year" th:field="*{year}" />
            <div class="error" th:if="${#fields.hasErrors('year')}" th:errors="*{year}">Year Error</div>
        </div>

        <div class="form-group">
            <label for="licensePlate">License Plate</label>
            <input type="text" id="licensePlate" th:field="*{licensePlate}" />
            <div class="error" th:if="${#fields.hasErrors('licensePlate')}" th:errors="*{licensePlate}">Plate Error</div>
        </div>

        <div class="form-group">
            <label for="vin">VIN</label>
            <input type="text" id="vin" th:field="*{vin}" readonly style="background-color: #e9ecef;" />
        </div>

        <button type="submit" class="btn-submit">Save Changes</button>
        <a th:href="@{/}" class="btn-cancel">Cancel</a>
    </form>
</div>

</body>
</html>

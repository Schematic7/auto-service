<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Appointment - AutoService</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column;}

        .navbar { background-color: #343a40; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); width: 100%; box-sizing: border-box; position: fixed; top: 0;}
        .navbar a { color: white; text-decoration: none; margin-left: 20px; font-weight: 500; font-size: 16px;}
        .navbar a:hover { color: #17a2b8; }
        .logo a { font-size: 24px; font-weight: bold; margin-left: 0; letter-spacing: 1px;}

        .form-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; margin-top: 80px;}
        h2 { text-align: center; color: #333; margin-bottom: 5px; margin-top: 0;}
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px;}

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; font-size: 14px;}
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit; font-size: 14px;}
        textarea { resize: vertical; min-height: 80px; }

        .btn-submit { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 16px; transition: background-color 0.2s;}
        .btn-submit:hover { background-color: #0056b3; }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px;}
        .btn-cancel:hover { text-decoration: underline; color: #333;}

        .error { color: #dc3545; font-size: 12px; margin-top: 5px; }
        .empty-state { padding: 15px; background-color: #f8d7da; color: #721c24; border-radius: 5px; font-size: 14px; margin-bottom: 15px; border: 1px solid #f5c6cb;}
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">
        <a th:href="@{/}">AutoService</a>
    </div>
    <div class="menu">
        <a th:href="@{/}">My Garage</a>
    </div>
</div>

<div class="form-container">
    <h2>📅 Book Appointment</h2>
    <p class="subtitle">Schedule a service for your vehicle</p>

    <div th:if="${#lists.isEmpty(userVehicles)}" class="empty-state">
        You need to add a vehicle to your garage before booking an appointment.
        <br><br>
        <a th:href="@{/vehicles/add}" style="color: #721c24; font-weight: bold; text-decoration: underline;">Add Vehicle Now</a>
    </div>

    <form th:if="${!#lists.isEmpty(userVehicles)}" th:action="@{/appointments/add}" th:method="POST" th:object="${appointmentAddDTO}">

        <div class="form-group">
            <label for="vehicleId">Select Vehicle <span style="color:red">*</span></label>
            <select id="vehicleId" th:field="*{vehicleId}">
                <option value="" disabled selected>-- Choose your car --</option>
                <option th:each="vehicle : ${userVehicles}"
                        th:value="${vehicle.id}"
                        th:text="${vehicle.make + ' ' + vehicle.model + ' (' + vehicle.licensePlate + ')'}">
                </option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('vehicleId')}" th:errors="*{vehicleId}">Error</div>
        </div>

        <div class="form-group">
            <label for="serviceTypeId">Service Type <span style="color:red">*</span></label>
            <select id="serviceTypeId" th:field="*{serviceTypeId}">
                <option value="" disabled selected>-- Choose service --</option>
                <option th:each="service : ${allServices}"
                        th:value="${service.id}"
                        th:text="${service.name + ' - $' + service.price}">
                </option>
            </select>
            <div class="error" th:if="${#fields.hasErrors('serviceTypeId')}" th:errors="*{serviceTypeId}">Error</div>
        </div>

        <div class="form-group">
            <label for="appointmentDate">Preferred Date & Time <span style="color:red">*</span></label>
            <input type="datetime-local" id="appointmentDate" th:field="*{appointmentDate}" />
            <div class="error" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}">Error</div>
        </div>

        <div class="form-group">
            <label for="notes">Additional Notes (Optional)</label>
            <textarea id="notes" th:field="*{notes}" placeholder="E.g. Check the brakes, they are squeaking..."></textarea>
        </div>

        <button type="submit" class="btn-submit">Confirm Booking</button>
        <a th:href="@{/}" class="btn-cancel">Cancel</a>
    </form>
</div>

</body>
</html>

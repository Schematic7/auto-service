<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DriveOn Motors</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #1a1c23;
            color: #edf2f4;
        }


        .split-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .left-side {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            background-color: #1a1c23;
            position: relative;
            z-index: 10;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }

        .form-container {
            width: 100%;
            max-width: 380px;
        }

        .brand-logo {
            font-weight: 900;
            letter-spacing: 1.5px;
            font-size: 2rem;
            color: #ffffff;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 40px;
        }
        .brand-highlight { color: #e63946; }

        h2 {
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #a0a5b5;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 15px;
            background-color: #2b2d42;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #e63946;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2);
            background-color: #35394a;
        }

        input::placeholder { color: #6c757d; }

        .global-error {
            background-color: rgba(220, 53, 69, 0.1);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid rgba(220, 53, 69, 0.3);
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .global-success {
            background-color: rgba(40, 167, 69, 0.1);
            color: #51cf66;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 25px;
            border: 1px solid rgba(40, 167, 69, 0.3);
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #e63946;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
            transition: background-color 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-submit:hover { background-color: #d90429; }

        .register-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #a0a5b5;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .register-link:hover { color: #ffffff; }
        .register-link span { color: #e63946; font-weight: 700; }

        .right-side {
            flex: 0 0 60%;
            background-image: linear-gradient(to right, rgba(26, 28, 35, 0.8) 0%, rgba(26, 28, 35, 0.2) 100%), url('/images/car.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 60px;
        }

        .right-content {
            max-width: 500px;
        }

        .right-content h1 {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .right-content p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }

        @media (max-width: 992px) {
            .split-layout { flex-direction: column; }
            .left-side { flex: 100%; width: 100%; box-shadow: none; }
            .right-side { display: none; }
        }
    </style>
</head>
<body>

<div class="split-layout">

    <div class="left-side">
        <div class="form-container">

            <a href="/" class="brand-logo">DRIVE<span class="brand-highlight">ON</span></a>

            <h2>Welcome Back</h2>

            <div th:if="${param.error}" class="global-error">
                Invalid username or password!
            </div>

            <div th:if="${param.logout}" class="global-success">
                You have been successfully logged out.
            </div>

            <form th:action="@{/users/login}" th:method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required/>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required/>
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <a th:href="@{/users/register}" class="register-link">Don't have an account? <span>Register here</span></a>
        </div>
    </div>

    <div class="right-side">
        <div class="right-content">
            <h1>Excellence in <br><span class="brand-highlight">Motion.</span></h1>
            <p>Access your personal garage and manage your vehicle's service history in one place.</p>
        </div>
    </div>

</div>

</body>
</html>
